<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IIM-associated cancer screening</title>
    <meta
      name="description"
      content="Cancer screening recommendations for idiopathic inflammatory myopathies (IIMs) based on International Myositis Assessment and Clinical Studies Group (IMACS) guidelines."
    />

    <style>
      :root {
        --bg: #f6f8fb;
        --panel: #ffffff;
        --text: #0f172a;
        --muted: #475569;
        --muted-2: #64748b;
        --border: #e2e8f0;
        --shadow: 0 10px 30px rgba(2, 6, 23, 0.08);
        --shadow-soft: 0 6px 18px rgba(2, 6, 23, 0.06);
        --ring: rgba(37, 99, 235, 0.25);

        --blue: #2563eb;
        --blue-2: #1d4ed8;
        --green: #16a34a;
        --amber: #d97706;
        --red: #dc2626;

        --radius: 14px;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          Helvetica,
          Arial,
          "Apple Color Emoji",
          "Segoe UI Emoji";
        color: var(--text);
        background: radial-gradient(1200px 700px at 15% 0%, #eef2ff 0%, transparent 60%),
          radial-gradient(1000px 700px at 100% 20%, #eff6ff 0%, transparent 55%),
          var(--bg);
        overflow-x: hidden;
      }

      a {
        color: inherit;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 28px 18px 38px;
      }

      .topbar {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 18px;
      }

      .brand {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .title {
        font-size: clamp(22px, 2.7vw, 32px);
        font-weight: 760;
        letter-spacing: -0.02em;
        line-height: 1.1;
      }

      .subtitle {
        color: var(--muted);
        line-height: 1.4;
        font-size: 14px;
        max-width: 66ch;
      }

      .introGuidanceBox {
        margin-top: 12px;
        max-width: 78ch;
        display: flex;
        align-items: flex-start;
        gap: 10px;
        padding: 12px 12px;
        border-radius: 14px;
        border: 1px solid rgba(251, 191, 36, 0.35);
        background: linear-gradient(180deg, rgba(255, 247, 237, 0.95), rgba(255, 237, 213, 0.55));
        box-shadow: 0 1px 0 rgba(2, 6, 23, 0.03);
      }

      .introGuidanceBulb {
        width: 18px;
        height: 18px;
        flex: 0 0 auto;
        margin-top: 1px;
        color: rgba(217, 119, 6, 0.95);
      }

      .introGuidanceBulb svg {
        display: block;
        width: 18px;
        height: 18px;
      }

      .introGuidance {
        flex: 1 1 auto;
        min-width: 0;
        color: #0b1220;
        font-size: 13px;
        line-height: 1.45;
        font-weight: 520;
      }

      .introGuidanceStrong {
        font-weight: 780;
      }

      .introGuidanceRest {
        font-weight: 520;
        color: rgba(15, 23, 42, 0.86);
      }

      .pageCitation {
        margin-top: 14px;
        padding-top: 12px;
        border-top: 1px solid var(--border);
        color: var(--muted-2);
        font-size: 12px;
        line-height: 1.45;
        max-width: 110ch;
      }

      .pageCitation a {
        color: inherit;
        text-decoration: underline;
        text-underline-offset: 3px;
        font-weight: 650;
      }

      .pageCitation a:hover {
        color: var(--text);
      }

      .pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 10px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.7);
        border-radius: 999px;
        color: var(--muted);
        font-size: 12px;
        box-shadow: 0 1px 0 rgba(2, 6, 23, 0.04);
        backdrop-filter: blur(8px);
        white-space: nowrap;
      }

      .grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 18px;
        align-items: start;
        min-width: 0;
      }

      .card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow-soft);
        overflow: hidden;
        min-width: 0;
      }

      .cardHeader {
        padding: 14px 16px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        background: linear-gradient(to bottom, rgba(248, 250, 252, 0.9), rgba(255, 255, 255, 0.9));
      }

      .cardHeader h2 {
        margin: 0;
        font-size: 14px;
        letter-spacing: 0.01em;
        color: #0b1220;
      }

      .cardBody {
        padding: 16px;
        min-width: 0;
      }

      .sectionTitle {
        font-size: 13px;
        font-weight: 700;
        color: #0b1220;
        margin: 0 0 10px;
      }

      .sectionTitleRow {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 12px;
      }

      .sectionTitleRow .sectionTitle {
        margin: 0;
      }

      .helper {
        margin: 8px 0 0;
        color: var(--muted-2);
        font-size: 12px;
        line-height: 1.4;
      }

      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      @media (max-width: 560px) {
        .row {
          grid-template-columns: 1fr;
        }
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      label.small {
        font-size: 12px;
        color: var(--muted);
      }

      .control {
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 10px 12px;
        font-size: 14px;
        outline: none;
        background: #fff;
      }

      .control:focus {
        border-color: rgba(37, 99, 235, 0.55);
        box-shadow: 0 0 0 4px var(--ring);
      }

      .segmented {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        border: 1px solid var(--border);
        border-radius: 12px;
        overflow: hidden;
        background: #fff;
      }

      .segmented button {
        padding: 10px 10px;
        border: 0;
        background: transparent;
        cursor: pointer;
        font-size: 13px;
        color: var(--muted);
        line-height: 1.2;
      }

      .segmented button + button {
        border-left: 1px solid var(--border);
      }

      .segmented button.active {
        color: #0b1220;
        background: rgba(37, 99, 235, 0.08);
        font-weight: 700;
      }

      .callout {
        margin-top: 10px;
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px solid rgba(217, 119, 6, 0.35);
        background: rgba(245, 158, 11, 0.08);
        color: #7c2d12;
        font-size: 12px;
        line-height: 1.35;
      }

      .riskTable {
        border: 1px solid var(--border);
        border-radius: 14px;
        overflow: hidden;
        background: #fff;
      }

      .riskTableHeader {
        display: grid;
        grid-template-columns: 1.25fr 1fr 1fr 1fr;
        gap: 0;
        border-bottom: 1px solid var(--border);
        background: rgba(248, 250, 252, 0.85);
      }

      .riskTableHeader div {
        padding: 10px 12px;
        font-size: 12px;
        color: var(--muted);
        font-weight: 700;
      }

      .riskTableHeader .colHigh {
        color: #7f1d1d;
      }
      .riskTableHeader .colInter {
        color: #78350f;
      }
      .riskTableHeader .colLow {
        color: #14532d;
      }

      .groupRow {
        display: grid;
        grid-template-columns: 1.25fr 1fr 1fr 1fr;
        border-bottom: 1px solid var(--border);
      }
      .groupRow:last-child {
        border-bottom: 0;
      }

      .groupLabel {
        padding: 12px;
        border-right: 1px solid var(--border);
        background: rgba(248, 250, 252, 0.75);
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .groupLabel .name {
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.02em;
        text-transform: uppercase;
        color: #0b1220;
      }

      .groupLabel .hint {
        font-size: 12px;
        color: var(--muted-2);
        line-height: 1.35;
      }

      .groupCell {
        padding: 10px 12px;
      }

      .checks {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .check {
        display: flex;
        gap: 10px;
        align-items: flex-start;
        padding: 8px 10px;
        border-radius: 12px;
        border: 1px solid rgba(226, 232, 240, 0.9);
        background: rgba(255, 255, 255, 0.9);
        transition: box-shadow 120ms ease, border-color 120ms ease, transform 120ms ease;
      }

      .check:hover {
        border-color: rgba(148, 163, 184, 0.8);
        box-shadow: 0 6px 16px rgba(2, 6, 23, 0.06);
        transform: translateY(-1px);
      }

      .check input {
        margin-top: 2px;
        width: 16px;
        height: 16px;
        accent-color: var(--blue);
      }

      .check .labelText {
        font-size: 13px;
        color: #0b1220;
        line-height: 1.25;
      }

      .subtleCounts {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        align-items: center;
        justify-content: flex-end;
        color: var(--muted);
        font-size: 12px;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 8px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.75);
      }

      .dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        display: inline-block;
      }

      .dot.high {
        background: var(--red);
      }
      .dot.intermediate {
        background: var(--amber);
      }
      .dot.low {
        background: var(--green);
      }

      .outputCard {
        position: static;
        min-width: 0;
      }

      @media (max-width: 680px) {
        .riskTableHeader {
          display: none;
        }

        .groupRow {
          grid-template-columns: 1fr;
        }

        .groupLabel {
          border-right: 0;
          border-bottom: 1px solid var(--border);
        }

        .groupCell {
          border-bottom: 1px solid var(--border);
          position: relative;
          padding-top: 34px;
        }

        .groupCell:last-child {
          border-bottom: 0;
        }

        .groupCell.colHighCell::before,
        .groupCell.colInterCell::before,
        .groupCell.colLowCell::before {
          position: absolute;
          top: 10px;
          left: 12px;
          font-size: 11px;
          font-weight: 850;
          letter-spacing: 0.08em;
          text-transform: uppercase;
          opacity: 0.85;
        }

        .groupCell.colHighCell::before {
          content: "High risk";
          color: #7f1d1d;
        }
        .groupCell.colInterCell::before {
          content: "Intermediate risk";
          color: #78350f;
        }
        .groupCell.colLowCell::before {
          content: "Low risk";
          color: #14532d;
        }
      }

      .outputHeader {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .riskPill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 10px;
        border-radius: 999px;
        border: 1px solid var(--border);
        font-size: 12px;
        font-weight: 700;
        white-space: nowrap;
      }
      .riskPill.high {
        background: rgba(220, 38, 38, 0.08);
        border-color: rgba(220, 38, 38, 0.25);
        color: #7f1d1d;
      }
      .riskPill.moderate {
        background: rgba(217, 119, 6, 0.1);
        border-color: rgba(217, 119, 6, 0.28);
        color: #78350f;
      }
      .riskPill.standard {
        background: rgba(22, 163, 74, 0.09);
        border-color: rgba(22, 163, 74, 0.25);
        color: #14532d;
      }
      .riskPill.na {
        background: rgba(100, 116, 139, 0.08);
        border-color: rgba(100, 116, 139, 0.22);
        color: #334155;
      }

      .outputBody h3 {
        font-size: 13px;
        margin: 14px 0 8px;
        color: #0b1220;
      }

      .outputBody p {
        margin: 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.45;
        overflow-wrap: anywhere;
      }

      .recommendationFocus {
        margin-top: 12px;
        padding: 12px;
        border-radius: 16px;
        border: 1px solid rgba(79, 70, 229, 0.28);
        background: linear-gradient(180deg, rgba(79, 70, 229, 0.16), rgba(79, 70, 229, 0.07));
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.7), 0 10px 24px rgba(2, 6, 23, 0.06);
      }

      .recommendationFocus .helper {
        color: rgba(15, 23, 42, 0.68);
      }

      .recommendationFocus .bubble {
        background: rgba(255, 255, 255, 0.82);
        border-color: rgba(79, 70, 229, 0.22);
        display: flex;
        flex-direction: column;
      }

      .recommendationFocus .bubbleTitle {
        color: rgba(2, 6, 23, 0.92);
      }

      .recommendationFocus .bubbleHelper {
        margin-top: auto;
        padding-top: 10px;
      }

      .bubbleGrid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-top: 10px;
      }

      @media (max-width: 560px) {
        .bubbleGrid {
          grid-template-columns: 1fr;
        }
      }

      .bubble {
        border: 1px solid rgba(226, 232, 240, 0.95);
        background: rgba(248, 250, 252, 0.65);
        border-radius: 14px;
        padding: 12px;
        min-width: 0;
        overflow-wrap: anywhere;
      }

      .bubbleTitle {
        font-size: 12px;
        font-weight: 850;
        letter-spacing: 0.02em;
        text-transform: uppercase;
        color: #0b1220;
        margin-bottom: 8px;
      }

      .miniBullets {
        margin: 0;
        padding-left: 18px;
        color: #0b1220;
        font-size: 13px;
        line-height: 1.45;
      }

      .andRow {
        list-style: none;
        padding-left: 0;
        margin: 6px 0;
        display: flex;
        align-items: center;
        justify-content: flex-start;
        gap: 10px;
        color: rgba(15, 23, 42, 0.72);
        font-weight: 850;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-size: 11px;
      }

      .diagPathAltGrid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
        align-items: stretch;
        justify-items: stretch;
      }

      @media (min-width: 720px) {
        .diagPathAltGrid {
          grid-template-columns: 1fr auto 1fr;
          align-items: stretch;
        }
      }

      .outputBody sup,
      .miniBullets sup,
      .bullets sup {
        font-size: 0.75em;
        line-height: 0;
      }

      .orDivider {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        padding: 6px 0;
        color: rgba(15, 23, 42, 0.72);
        font-weight: 850;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        font-size: 11px;
        user-select: none;
      }

      .orDivider::before,
      .orDivider::after {
        content: "";
        height: 1px;
        width: 34px;
        background: rgba(148, 163, 184, 0.65);
      }

      @media (min-width: 720px) {
        .orDivider {
          flex-direction: column;
          padding: 0 6px;
          gap: 10px;
        }

        .orDivider::before,
        .orDivider::after {
          width: 1px;
          height: 34px;
        }
      }

      .bubbleGridPetAlt {
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      }

      @media (max-width: 899px) {
        .bubbleGridPetAlt {
          grid-template-columns: 1fr;
        }
      }

      @media (min-width: 900px) {
        .bubbleGridPetAlt {
          grid-template-columns: minmax(0, 1.85fr) minmax(0, 1fr);
        }
      }

      .bullets {
        margin: 0;
        padding-left: 18px;
        color: #0b1220;
        font-size: 13px;
        line-height: 1.45;
      }

      .bullets li {
        margin: 4px 0;
      }

      .subListTitle {
        font-weight: 800;
      }

      .divider {
        height: 1px;
        background: var(--border);
        margin: 14px 0;
      }

      .tinyNote {
        margin-top: 12px;
        font-size: 12px;
        color: var(--muted-2);
        line-height: 1.4;
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px dashed rgba(148, 163, 184, 0.8);
        background: rgba(248, 250, 252, 0.7);
      }

      .footerNote {
        margin-top: 14px;
        font-size: 12px;
        color: var(--muted-2);
        line-height: 1.4;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="module">
      import React, { useMemo, useState } from "https://esm.sh/react@18.3.1";
      import { createRoot } from "https://esm.sh/react-dom@18.3.1/client";

      const MSA_MAA_ROW =
        "Myositis-specific antibodies (MSA) and myositis-associated antibodies (MAA)";

      const PET_SINGLE_SCREENING_EXTRA_HIGH_CLINICAL_IDS = [
        "clinical_persistent_high_disease_activity_despite_therapy",
        "clinical_dysphagia_moderate_to_severe",
        "clinical_cutaneous_necrosis",
      ];

      const RISK_FACTORS = [
        { id: "iim_subtype_dermatomyositis", label: "Dermatomyositis", row: "IIM subtype", column: "high_risk" },
        { id: "iim_subtype_cadm", label: "Clinically amyopathic dermatomyositis (CADM)", row: "IIM subtype", column: "intermediate_risk" },
        { id: "iim_subtype_polymyositis", label: "Polymyositis", row: "IIM subtype", column: "intermediate_risk" },
        { id: "iim_subtype_imnm", label: "Immune-mediated necrotizing myopathy (IMNM)", row: "IIM subtype", column: "intermediate_risk" },
        { id: "iim_subtype_assd", label: "Antisynthetase syndrome (ASSD)", row: "IIM subtype", column: "low_risk" },
        { id: "iim_subtype_ctd_associated_iim", label: "Connective tissue disease (CTD)-associated IIM", row: "IIM subtype", column: "low_risk" },
        { id: "msa_maa_anti_tif1_gamma", label: "Anti-TIF1-γ antibodies", row: MSA_MAA_ROW, column: "high_risk" },
        { id: "msa_maa_anti_nxp2", label: "Anti-NXP2 antibodies", row: MSA_MAA_ROW, column: "high_risk" },
        { id: "msa_maa_anti_sae1", label: "Anti-SAE1 antibodies", row: MSA_MAA_ROW, column: "intermediate_risk" },
        { id: "msa_maa_anti_hmgcr", label: "Anti-HMGCR antibodies", row: MSA_MAA_ROW, column: "intermediate_risk" },
        { id: "msa_maa_anti_mi2", label: "Anti-Mi2 antibodies", row: MSA_MAA_ROW, column: "intermediate_risk" },
        { id: "msa_maa_anti_mda5", label: "Anti-MDA5 antibodies", row: MSA_MAA_ROW, column: "intermediate_risk" },
        { id: "msa_maa_anti_srp", label: "Anti-SRP antibodies", row: MSA_MAA_ROW, column: "low_risk" },
        { id: "msa_maa_anti_jo1", label: "Anti-Jo1 antibodies", row: MSA_MAA_ROW, column: "low_risk" },
        {
          id: "msa_maa_non_jo1_assd_antibodies",
          label: "Non-Jo-1 antisynthetase antibodies (e.g., PL-7, PL-12, EJ, OJ)",
          row: MSA_MAA_ROW,
          column: "low_risk",
        },
        {
          id: "msa_maa_maa",
          label:
            "Myositis-associated antibodies (Anti-PM-Scl, anti-Ku, anti-RNP, anti-SSA/Ro, or anti-SSB/La)",
          row: MSA_MAA_ROW,
          column: "low_risk",
        },
        { id: "clinical_age_over_40_at_onset", label: "Age >40 years at IIM onset", row: "Clinical features", column: "high_risk" },
        {
          id: "clinical_persistent_high_disease_activity_despite_therapy",
          label: "Persistent high disease activity despite therapy",
          row: "Clinical features",
          column: "high_risk",
        },
        { id: "clinical_dysphagia_moderate_to_severe", label: "Dysphagia (moderate to severe)", row: "Clinical features", column: "high_risk" },
        { id: "clinical_cutaneous_necrosis", label: "Cutaneous necrosis", row: "Clinical features", column: "high_risk" },
        { id: "clinical_male_sex", label: "Male sex", row: "Clinical features", column: "intermediate_risk" },
        { id: "clinical_raynaud_phenomenon", label: "Raynaud phenomenon", row: "Clinical features", column: "low_risk" },
        { id: "clinical_inflammatory_arthropathy", label: "Inflammatory arthropathy", row: "Clinical features", column: "low_risk" },
        { id: "clinical_interstitial_lung_disease", label: "Interstitial lung disease", row: "Clinical features", column: "low_risk" },
      ];

      const basic_screening_panel = [
        "Comprehensive history",
        "Comprehensive physical examination",
        "Complete blood count",
        "Serum liver function tests",
        "Serum ESR and/or plasma viscosity",
        "Serum CRP",
        "Serum protein electrophoresis",
        "Urinalysis",
        "Plain chest X-ray radiograph",
      ];

      const enhanced_screening_panel = [
        "CT scan of the neck, thorax, abdomen and pelvis",
        "Cervical screening",
        "Mammography",
        "Prostate-specific antigen",
        "CA-125",
        "Pelvic or transvaginal ultrasonography for ovarian cancer",
        "Faecal occult blood",
      ];

      function renderTextWithFDGSuperscript(text) {
        if (typeof text !== "string") return [text];
        const re = /18F([\u002D\u2010\u2011\u2012\u2013\u2014\u2015\u2212]|\s)FDG/gi;
        const nodes = [];
        let lastIndex = 0;
        let match;
        while ((match = re.exec(text)) !== null) {
          if (match.index > lastIndex) {
            nodes.push(text.slice(lastIndex, match.index));
          }
          const sep = match[1] || "-";
          nodes.push(React.createElement("sup", null, "18"), "F", sep, "FDG");
          lastIndex = re.lastIndex;
        }
        if (lastIndex === 0) return [text];
        if (lastIndex < text.length) nodes.push(text.slice(lastIndex));
        return nodes;
      }

      function buildRecommendation({ iimType, selectedIds, npcRegionChecked }) {
        if (iimType === "juvenile_onset") {
          return {
            mode: "no_routine",
            riskCategory: "Not applicable",
          };
        }

        if (iimType === "inclusion_body_myositis") {
          return {
            mode: "no_routine",
            riskCategory: "Not applicable",
          };
        }

        // adult_onset
        const selected = RISK_FACTORS.filter((f) => selectedIds.has(f.id));
        const high_risk_count = selected.filter((f) => f.column === "high_risk").length;
        const intermediate_risk_count = selected.filter((f) => f.column === "intermediate_risk").length;
        const low_risk_count = selected.filter((f) => f.column === "low_risk").length;

        let risk_category = "Standard risk of IIM-related cancer";
        if (high_risk_count >= 2) {
          risk_category = "High risk of IIM-related cancer";
        } else if (intermediate_risk_count >= 2 || high_risk_count === 1) {
          risk_category = "Moderate risk of IIM-related cancer";
        }

        const recommendation = {
          mode: "adult",
          riskCategory: risk_category,
          counts: { high_risk_count, intermediate_risk_count, low_risk_count },
          petAlternativeAtDiagnosis: false,
          content: {
            timeOfDiagnosis: [],
            followUp: [],
            additional: [],
          },
        };

        if (risk_category === "High risk of IIM-related cancer") {
          recommendation.content.timeOfDiagnosis.push(
            { title: "Basic screening panel", items: basic_screening_panel },
            { title: "Enhanced screening panel", items: enhanced_screening_panel }
          );
          recommendation.content.followUp.push(
            { title: "Basic screening panel at 1, 2, and 3 years after IIM onset", items: basic_screening_panel }
          );
          recommendation.content.additional.push(
            "18F-FDG PET-CT (when recommended screenings above at IIM diagnosis do not detect cancer)",
            "Upper GI endoscopy (when recommended screenings above at IIM diagnosis do not detect cancer)",
            "Lower GI endoscopy (when recommended screenings above at IIM diagnosis do not detect cancer)"
          );
        } else if (risk_category === "Moderate risk of IIM-related cancer") {
          recommendation.content.timeOfDiagnosis.push(
            { title: "Basic screening panel", items: basic_screening_panel },
            { title: "Enhanced screening panel", items: enhanced_screening_panel }
          );
          recommendation.content.followUp.push("None");
        } else {
          recommendation.content.timeOfDiagnosis.push({ title: "Basic screening panel", items: basic_screening_panel });
          recommendation.content.followUp.push("None");
        }

        const hasBasicAndEnhancedAtDiagnosis =
          recommendation.content.timeOfDiagnosis.length === 2 &&
          recommendation.content.timeOfDiagnosis.some((p) => p.title === "Basic screening panel") &&
          recommendation.content.timeOfDiagnosis.some((p) => p.title === "Enhanced screening panel");

        const extraHighClinicalSelectedCount = PET_SINGLE_SCREENING_EXTRA_HIGH_CLINICAL_IDS.filter((id) =>
          selectedIds.has(id)
        ).length;

        recommendation.petAlternativeAtDiagnosis =
          hasBasicAndEnhancedAtDiagnosis &&
          selectedIds.has("iim_subtype_dermatomyositis") &&
          selectedIds.has("msa_maa_anti_tif1_gamma") &&
          selectedIds.has("clinical_age_over_40_at_onset") &&
          extraHighClinicalSelectedCount >= 1;

        if (npcRegionChecked) {
          recommendation.content.additional.push("Nasoendoscopy at time of diagnosis");
        }

        return recommendation;
